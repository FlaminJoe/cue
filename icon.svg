<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" role="img" aria-label="Cue">
  <defs>
    <!-- warm cream backdrop -->
    <linearGradient id="cue-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4e9d8"/>
      <stop offset="1" stop-color="#e7d5bb"/>
    </linearGradient>
    <!-- terracotta mark, light top-left → deep bottom-right -->
    <linearGradient id="cue-mark" x1="0.18" y1="0.12" x2="0.86" y2="0.92">
      <stop offset="0" stop-color="#d2885a"/>
      <stop offset="0.55" stop-color="#bd6d44"/>
      <stop offset="1" stop-color="#a3502f"/>
    </linearGradient>
    <!-- glow behind the signal dot -->
    <radialGradient id="cue-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e9a06f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#e9a06f" stop-opacity="0"/>
    </radialGradient>
    <!-- warm light inside the dot -->
    <radialGradient id="cue-dot" cx="38%" cy="32%" r="80%">
      <stop offset="0" stop-color="#f8dcbd"/>
      <stop offset="0.5" stop-color="#d98a55"/>
      <stop offset="1" stop-color="#b25c36"/>
    </radialGradient>
  </defs>

  <!-- maskable-safe: backdrop fills the whole tile, mark stays well within the 80% safe zone -->
  <rect width="192" height="192" rx="44" fill="url(#cue-bg)"/>

  <!-- soft ambient halo -->
  <circle cx="118" cy="96" r="60" fill="url(#cue-halo)"/>

  <!-- the "C": open arc embracing the signal, rounded warm terminals -->
  <path d="M131.2 67.7 A45 45 0 1 0 131.2 124.3"
        fill="none" stroke="url(#cue-mark)" stroke-width="20" stroke-linecap="round"/>

  <!-- the cue: a glowing dot held in the opening -->
  <circle cx="137" cy="96" r="13.5" fill="url(#cue-dot)"/>
  <circle cx="132.5" cy="91" r="4" fill="#fceadb" opacity="0.85"/>
</svg>
